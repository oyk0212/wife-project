<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>금지어 회피: 말실수 로그라이크</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>

  <main class="app" id="app">
    <header class="hud">
      <div class="hud-item"><span>라운드</span><strong id="roundText">1/10</strong></div>
      <div class="hud-item"><span>타이머</span><strong id="timerText">8.0s</strong></div>
      <div class="hud-item"><span>점수</span><strong id="scoreText">0</strong></div>
    </header>

    <section class="question-card" id="questionCard">
      <p class="label">상황 질문</p>
      <h1 id="questionText">게임 시작을 눌러주세요.</h1>
      <div class="forbidden" id="forbiddenWrap" aria-live="polite"></div>
    </section>

    <section class="composer">
      <p class="label">내 답변</p>
      <div id="sentencePreview" class="sentence-preview">(카드를 눌러 문장을 만드세요)</div>

      <div class="action-row">
        <button id="undoBtn" type="button" class="ghost">되돌리기</button>
        <button id="submitBtn" type="button" class="primary">제출</button>
      </div>
    </section>

    <section class="cards-grid" id="cardsGrid" aria-label="단어 카드 선택 영역"></section>

    <section class="overlay show" id="startOverlay" aria-live="polite">
      <div class="overlay-panel">
        <h2>금지어 회피: 말실수 로그라이크</h2>
        <p>코믹한 가상 상황에서 금지어를 피하며 10라운드를 생존하세요.</p>
        <button id="startBtn" type="button" class="primary big">게임 시작</button>
      </div>
    </section>

    <section class="overlay" id="resultOverlay" aria-live="assertive">
      <div class="overlay-panel">
        <h2 id="resultTitle">결과</h2>
        <p id="resultSubtitle"></p>
        <p id="resultFlavor" class="flavor"></p>
        <div class="action-row center">
          <button id="restartBtn" type="button" class="primary">다시하기</button>
          <button id="copyBtn" type="button" class="ghost">결과 복사</button>
        </div>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="game.js"></script>
</body>
</html>
